<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="NatyaSpace"/>
<meta name="theme-color" content="#F5EDE0"/>
<title>NatyaSpace</title>
<link rel="manifest" href="manifest.json"/>
<link rel="stylesheet" href="styles.css"/>
<style>
/* ── HERO ── */
.s-hero{background:linear-gradient(135deg,#F0DDD0 0%,#F5EDE0 60%,#D6DDCF 100%);padding:60px 24px 28px;text-align:center;border-bottom:1px solid var(--border)}
.s-avatar{width:74px;height:74px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;font-family:var(--font);margin:0 auto 14px;box-shadow:0 4px 16px rgba(60,47,36,.15)}
.s-hero-name{font-family:var(--serif);font-size:28px;font-weight:500;color:var(--text);margin-bottom:4px}
.s-hero-sub{font-size:13px;color:var(--text2);margin-bottom:18px}
.s-pills{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.s-pill{background:rgba(255,255,255,.75);border:1px solid var(--border);border-radius:20px;padding:8px 20px;text-align:center;min-width:90px;backdrop-filter:blur(4px)}
.s-pill-val{font-family:var(--serif);font-size:20px;font-weight:500;line-height:1.1}
.s-pill-lbl{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-top:2px}

/* ── TABS ── */
.s-tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;overflow-x:auto;scrollbar-width:none}
.s-tabs::-webkit-scrollbar{display:none}
.s-tab{flex:1;min-width:72px;padding:13px 6px 11px;border:none;background:none;font-family:var(--font);font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.s-tab.active{color:var(--tan);border-bottom-color:var(--tan)}
.s-tab-icon{font-size:16px;display:block;margin-bottom:3px}
.s-badge{display:inline-block;background:var(--tan);color:#fff;border-radius:10px;font-size:9px;padding:1px 5px;margin-left:3px;vertical-align:middle;font-style:normal}

/* ── CONTENT WRAPPER ── */
.s-content{padding:20px 16px 48px;max-width:680px;margin:0 auto;width:100%}

/* ── CLASS CARDS ── */
.class-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.class-card-header{display:flex;align-items:flex-start;gap:14px;padding:18px 16px}
.class-card-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;margin-top:2px}
.class-card-body{flex:1;min-width:0}
.class-card-name{font-weight:600;font-size:16px;margin-bottom:3px}
.class-card-meta{font-size:12px;color:var(--text3);margin-bottom:6px}
.style-chip{background:var(--sage-pale);color:#4A5E3C;border-radius:12px;padding:2px 10px;font-size:11px;font-weight:600;display:inline-block}
.class-card-fee{text-align:right;flex-shrink:0}
.class-card-amount{font-family:var(--serif);font-size:20px;font-weight:500;color:var(--tan)}
.class-card-count{font-size:11px;color:var(--text3);margin-top:2px}
.class-sessions{border-top:1px solid var(--border)}
.class-sess-row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border)}
.class-sess-row:last-child{border-bottom:none}
.class-sess-date{font-weight:500;font-size:14px}
.class-sess-hrs{font-size:12px;color:var(--text3);margin-top:2px}
.class-sess-fee{font-family:var(--serif);font-size:15px;color:var(--tan);font-weight:500}

/* ── STATS STRIP ── */
.stats-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-strip-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 10px;text-align:center;box-shadow:var(--shadow)}
.stat-strip-val{font-family:var(--serif);font-size:22px;font-weight:500;margin-bottom:2px}
.stat-strip-lbl{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.5px;text-transform:uppercase}

/* ── TIMELINE ── */
.tl-month{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);padding:16px 0 8px}
.tl-item{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.tl-info{flex:1}
.tl-date{font-weight:500;font-size:14px}
.tl-group{font-size:12px;color:var(--text3);margin-top:2px}
.tl-fee{font-family:var(--serif);font-size:15px;color:var(--tan);font-weight:500;flex-shrink:0}
.tl-free{font-size:12px;color:var(--green);font-weight:600;flex-shrink:0}

/* ── PRACTICE ── */
.vid-section-hd{display:flex;align-items:center;gap:10px;margin:20px 0 12px}
.vid-section-hd:first-child{margin-top:0}
.vid-section-txt{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);white-space:nowrap}
.vid-section-line{flex:1;height:1px;background:var(--border)}
.vid-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:420px){.vid-grid{grid-template-columns:1fr}}
.vid-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s}
.vid-card:active{transform:scale(.97)}
.vid-thumb{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden;background:var(--bg3)}
.vid-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.vid-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.2);transition:background .15s}
.vid-card:hover .vid-play{background:rgba(0,0,0,.38)}
.vid-play-btn{width:42px;height:42px;background:rgba(255,255,255,.92);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--text);padding-left:3px}
.vid-info{padding:10px 12px 12px}
.vid-title{font-weight:600;font-size:13px;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vid-meta{font-size:11px;color:var(--text3)}
.vid-desc{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── PAYMENTS ── */
.bal-summary{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.bal-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.bal-row:last-child{border-bottom:none;padding-top:14px;margin-top:4px}
.bal-row-lbl{font-size:14px;color:var(--text2)}
.bal-row-val{font-family:var(--serif);font-size:17px;font-weight:500}
.bal-row.total .bal-row-lbl{font-weight:600;font-size:15px;color:var(--text)}
.bal-row.total .bal-row-val{font-size:22px}
.pay-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.pay-row:last-child{border-bottom:none}
.pay-note{font-weight:500;font-size:14px}
.pay-date{font-size:12px;color:var(--text3);margin-top:2px}
.pay-amount{font-family:var(--serif);font-size:20px;font-weight:500;color:var(--green)}

/* ── EMPTY ── */
.s-empty{text-align:center;padding:48px 24px}
.s-empty-icon{font-size:40px;margin-bottom:12px;opacity:.6}
.s-empty-title{font-family:var(--serif);font-size:20px;color:var(--text2);margin-bottom:8px}
.s-empty p{font-size:14px;color:var(--text3);line-height:1.6}

/* ── HEADER OVERLAY ── */
.s-header{position:absolute;top:0;left:0;right:0;z-index:20;padding:max(env(safe-area-inset-top),12px) 20px 0;display:flex;align-items:center;justify-content:space-between;padding-bottom:10px}
</style>
</head>
<body>
<div class="app" id="root"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { sb, DAY_NAMES } from './supabase.js';
import { S, ini, fmtD, fmtM, fees, studentGroups, showToast } from './state.js';

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
let activeTab = 'classes';

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.replace('./login.html'); return; }
  S.session = session;
  const { data: prof } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
  S.profile = prof;
  if (prof?.role === 'teacher') { window.location.replace('./app.html'); return; }
  const { data: sr } = await sb.from('students').select('*').eq('user_id', session.user.id).single();
  S.studentRecord = sr;
  await loadAll();
}

async function loadAll() {
  S.loading = true; render();
  const sid = S.studentRecord?.id;
  if (!sid) { S.loading = false; render(); return; }
  const [se,pa,gr,gm,vi] = await Promise.all([
    sb.from('sessions').select('*').eq('student_id',sid).order('date',{ascending:false}),
    sb.from('payments').select('*').eq('student_id',sid).order('date',{ascending:false}),
    sb.from('groups').select('*'),
    sb.from('group_members').select('*').eq('student_id',sid),
    sb.from('videos').select('*').order('created_at',{ascending:false}),
  ]);
  S.sessions=se.data||[]; S.payments=pa.data||[];
  S.groups=gr.data||[]; S.groupMembers=gm.data||[];
  S.videos=vi.data||[]; S.students=[S.studentRecord];
  S.loading=false; render();
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const root = document.getElementById('root');
  if (S.loading) {
    root.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)"><div class="loading"><div class="spinner"></div>Loading…</div></div>`;
    return;
  }
  const s = S.studentRecord;
  if (!s) {
    root.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;background:var(--bg);padding:32px">
      <p style="color:var(--text3);font-size:14px;text-align:center">Your account isn't linked yet.<br/>Ask your teacher to set up your login.</p>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Sign out</button></div>`;
    return;
  }

  const f        = fees(s.id);
  const myGroups = studentGroups(s.id);
  const myGids   = myGroups.map(g=>g.id);
  const allVids  = S.videos.filter(v=>v.student_id===s.id || myGids.includes(v.group_id));

  root.innerHTML = `
  <div style="position:relative;overflow-y:auto;height:100vh;-webkit-overflow-scrolling:touch" id="scroll-area">

    <!-- Floating header -->
    <div class="s-header">
      <div class="logo" style="font-size:22px;opacity:.85">Natya<span>Space</span></div>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()" style="background:rgba(255,255,255,.7);backdrop-filter:blur(6px)">Sign out</button>
    </div>

    <!-- Hero -->
    <div class="s-hero">
      <div class="s-avatar ${s.color||'av-tan'}">${ini(s.name)}</div>
      <div class="s-hero-name">${s.name}</div>
      <div class="s-hero-sub">${s.notes||'Dance student'}</div>
      <div class="s-pills">
        <div class="s-pill"><div class="s-pill-val v-tan">${fmtM(f.earned)}</div><div class="s-pill-lbl">Total fees</div></div>
        <div class="s-pill"><div class="s-pill-val v-green">${fmtM(f.paid)}</div><div class="s-pill-lbl">Paid</div></div>
        <div class="s-pill"><div class="s-pill-val" style="color:${f.due>0.01?'var(--red)':'var(--green)'}">${fmtM(f.due)}</div><div class="s-pill-lbl">${f.due>0.01?'Due':'All clear'}</div></div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="s-tabs" id="s-tabs">
      <button class="s-tab ${activeTab==='classes'?'active':''}" onclick="switchTab('classes')">
        <span class="s-tab-icon">🎵</span>My classes
      </button>
      <button class="s-tab ${activeTab==='history'?'active':''}" onclick="switchTab('history')">
        <span class="s-tab-icon">📅</span>Attendance
      </button>
      <button class="s-tab ${activeTab==='practice'?'active':''}" onclick="switchTab('practice')">
        <span class="s-tab-icon">▶</span>Practice${allVids.length?`<i class="s-badge">${allVids.length}</i>`:''}
      </button>
      <button class="s-tab ${activeTab==='payments'?'active':''}" onclick="switchTab('payments')">
        <span class="s-tab-icon">💳</span>Payments
      </button>
    </div>

    <!-- Content -->
    <div class="s-content" id="tab-content">
      ${buildTab(activeTab, s, f, myGroups, myGids, allVids)}
    </div>

  </div>`;
}

// ── TABS ──────────────────────────────────────────────────────
function buildTab(tab, s, f, myGroups, myGids, allVids) {
  if (tab==='classes')  return buildClasses(myGroups);
  if (tab==='history')  return buildHistory();
  if (tab==='practice') return buildPractice(s, myGroups);
  if (tab==='payments') return buildPayments(f);
  return '';
}

// ── CLASSES ───────────────────────────────────────────────────
function buildClasses(myGroups) {
  const privSess   = S.sessions.filter(se=>!se.group_id);
  const privEarned = privSess.reduce((a,se)=>a+(+se.fee||0),0);
  if (!myGroups.length && !privSess.length) return `<div class="s-empty"><div class="s-empty-icon">🎵</div><div class="s-empty-title">No classes yet</div><p>Your teacher will add you to classes soon.</p></div>`;

  const groupCards = myGroups.map(g=>{
    const gSess   = S.sessions.filter(se=>se.group_id===g.id);
    const gEarned = gSess.reduce((a,se)=>a+(+se.fee||0),0);
    return `<div class="class-card">
      <div class="class-card-header">
        <div class="class-card-icon ${g.color}">🎵</div>
        <div class="class-card-body">
          <div class="class-card-name">${g.name}</div>
          <div class="class-card-meta">${DAY_NAMES[g.day_of_week]}s at ${g.time_of_day||''}</div>
          ${g.style?`<span class="style-chip">${g.style}</span>`:''}
        </div>
        <div class="class-card-fee">
          <div class="class-card-amount">${fmtM(gEarned)}</div>
          <div class="class-card-count">${gSess.length} class${gSess.length!==1?'es':''}</div>
        </div>
      </div>
      ${gSess.length?`<div class="class-sessions">
        ${gSess.slice(0,5).map(se=>`<div class="class-sess-row">
          <div><div class="class-sess-date">${fmtD(se.date)}</div><div class="class-sess-hrs">${se.hours}hr</div></div>
          <div class="class-sess-fee">${+se.fee===0?'<span style="color:var(--green);font-size:13px;font-family:var(--font)">Free</span>':fmtM(se.fee)}</div>
        </div>`).join('')}
        ${gSess.length>5?`<div style="padding:10px 16px;font-size:12px;color:var(--tan);text-align:center;cursor:pointer" onclick="switchTab('history')">View all ${gSess.length} sessions →</div>`:''}
      </div>`:'<div style="padding:12px 16px;font-size:13px;color:var(--text3)">No sessions yet</div>'}
    </div>`;
  }).join('');

  const privCard = privSess.length ? `<div class="class-card">
    <div class="class-card-header">
      <div class="class-card-icon" style="background:#F0DDD0">🩰</div>
      <div class="class-card-body">
        <div class="class-card-name">Private lessons</div>
        <div class="class-card-meta">Individual sessions</div>
      </div>
      <div class="class-card-fee">
        <div class="class-card-amount">${fmtM(privEarned)}</div>
        <div class="class-card-count">${privSess.length} session${privSess.length!==1?'s':''}</div>
      </div>
    </div>
    <div class="class-sessions">
      ${privSess.slice(0,5).map(se=>`<div class="class-sess-row">
        <div><div class="class-sess-date">${fmtD(se.date)}</div><div class="class-sess-hrs">${se.hours}hr · Private</div></div>
        <div class="class-sess-fee">${+se.fee===0?'<span style="color:var(--green);font-size:13px;font-family:var(--font)">Free</span>':fmtM(se.fee)}</div>
      </div>`).join('')}
    </div>
  </div>` : '';

  return groupCards + privCard;
}

// ── ATTENDANCE ────────────────────────────────────────────────
function buildHistory() {
  const all = [...S.sessions].sort((a,b)=>b.date.localeCompare(a.date));
  if (!all.length) return `<div class="s-empty"><div class="s-empty-icon">📅</div><div class="s-empty-title">No attendance yet</div><p>Your class history will appear here once sessions are logged.</p></div>`;

  const totalHours = all.reduce((a,se)=>a+se.hours,0);
  const totalFees  = all.reduce((a,se)=>a+(+se.fee||0),0);
  const freeCount  = all.filter(se=>+se.fee===0).length;

  // Group by month
  const byMonth = {};
  all.forEach(se=>{
    const [y,m]=se.date.split('-'); const key=`${y}-${m}`;
    (byMonth[key]=byMonth[key]||[]).push(se);
  });

  const timeline = Object.entries(byMonth).map(([key,sessions])=>{
    const [y,m]=key.split('-');
    const rows = sessions.map(se=>{
      const grp = S.groups.find(g=>g.id===se.group_id);
      const dotClass = grp ? grp.color.replace('gi-','av-') : 'av-tan';
      return `<div class="tl-item">
        <div class="tl-dot ${dotClass}">${se.hours}</div>
        <div class="tl-info">
          <div class="tl-date">${fmtD(se.date)}</div>
          <div class="tl-group">${grp?grp.name:'Private lesson'}</div>
        </div>
        ${+se.fee===0?`<div class="tl-free">Free</div>`:`<div class="tl-fee">${fmtM(se.fee)}</div>`}
      </div>`;
    }).join('');
    return `<div class="tl-month">${MONTH_NAMES[+m-1]} ${y} <span style="font-weight:400">${sessions.length} class${sessions.length!==1?'es':''}</span></div>
    <div class="card" style="margin-bottom:6px">${rows}</div>`;
  }).join('');

  return `
  <div class="stats-strip">
    <div class="stat-strip-card"><div class="stat-strip-val v-sage">${all.length}</div><div class="stat-strip-lbl">Classes</div></div>
    <div class="stat-strip-card"><div class="stat-strip-val v-tan">${totalHours.toFixed(totalHours%1?1:0)}</div><div class="stat-strip-lbl">Hours</div></div>
    <div class="stat-strip-card"><div class="stat-strip-val" style="color:var(--green)">${freeCount>0?freeCount:'—'}</div><div class="stat-strip-lbl">Free</div></div>
  </div>
  ${timeline}`;
}

// ── PRACTICE ──────────────────────────────────────────────────
function buildPractice(s, myGroups) {
  const personalVids = S.videos.filter(v=>v.student_id===s.id && !v.group_id);
  const groupVids    = myGroups.map(g=>({g, vids:S.videos.filter(v=>v.group_id===g.id)})).filter(x=>x.vids.length>0);
  if (!personalVids.length && !groupVids.length) return `<div class="s-empty"><div class="s-empty-icon">🎬</div><div class="s-empty-title">No practice videos yet</div><p>Your teacher will upload practice videos and links here for you to review between classes.</p></div>`;

  let html = '';
  if (personalVids.length) {
    html += `<div class="vid-section-hd"><div class="vid-section-txt">For you</div><div class="vid-section-line"></div></div>
    <div class="vid-grid">${personalVids.map(v=>vidCard(v)).join('')}</div>`;
  }
  groupVids.forEach(({g,vids},i)=>{
    html += `<div class="vid-section-hd" style="margin-top:${personalVids.length||i?'20':'0'}px">
      <div class="vid-section-txt">${g.name}</div><div class="vid-section-line"></div>
    </div>
    <div class="vid-grid">${vids.map(v=>vidCard(v)).join('')}</div>`;
  });
  return html;
}

function vidCard(v) {
  const ytId = (v.youtube_url||'').match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{11})/)?.[1];
  const click = ytId ? `openYT('${v.youtube_url}')` : `playVid('${v.file_path}','${encodeURIComponent(v.title||'')}')`;
  return `<div class="vid-card" onclick="${click}">
    <div class="vid-thumb">
      ${ytId
        ? `<img src="https://img.youtube.com/vi/${ytId}/mqdefault.jpg" loading="lazy"/>`
        : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg2);font-size:32px">🎬</div>`}
      <div class="vid-play"><div class="vid-play-btn">▶</div></div>
    </div>
    <div class="vid-info">
      <div class="vid-title">${v.title||'Untitled'}</div>
      <div class="vid-meta">${v.created_at?fmtD(v.created_at.slice(0,10)):''}${ytId?' · YouTube':''}</div>
      ${v.description?`<div class="vid-desc">${v.description}</div>`:''}
    </div>
  </div>`;
}

// ── PAYMENTS ──────────────────────────────────────────────────
function buildPayments(f) {
  return `
  <div class="bal-summary">
    <div class="bal-row"><span class="bal-row-lbl">Total fees charged</span><span class="bal-row-val v-tan">${fmtM(f.earned)}</span></div>
    <div class="bal-row"><span class="bal-row-lbl">Total paid</span><span class="bal-row-val v-green">${fmtM(f.paid)}</span></div>
    <div class="bal-row total"><span class="bal-row-lbl">${f.due>0.01?'Outstanding balance':'You\'re all paid up!'}</span><span class="bal-row-val" style="color:${f.due>0.01?'var(--red)':'var(--green)'}">${fmtM(f.due)}</span></div>
  </div>
  ${!S.payments.length
    ? `<div class="s-empty" style="padding:24px"><div class="s-empty-icon">💳</div><div class="s-empty-title">No payments yet</div></div>`
    : `<div class="section-title">Payment history</div>
       <div class="card">${S.payments.map(p=>`<div class="pay-row">
         <div><div class="pay-note">${p.note||'Payment'}</div><div class="pay-date">${fmtD(p.date)}</div></div>
         <div class="pay-amount">${fmtM(p.amount)}</div>
       </div>`).join('')}</div>`}`;
}

// ── ACTIONS ───────────────────────────────────────────────────
window.switchTab = tab => {
  activeTab = tab;
  document.querySelectorAll('.s-tab').forEach(btn=>btn.classList.remove('active'));
  // find the right button by its onclick content
  document.querySelectorAll('.s-tab').forEach(btn=>{
    if(btn.getAttribute('onclick')===`switchTab('${tab}')`) btn.classList.add('active');
  });
  const s        = S.studentRecord;
  const f        = fees(s.id);
  const myGroups = studentGroups(s.id);
  const myGids   = myGroups.map(g=>g.id);
  const allVids  = S.videos.filter(v=>v.student_id===s.id || myGids.includes(v.group_id));
  document.getElementById('tab-content').innerHTML = buildTab(tab,s,f,myGroups,myGids,allVids);
  const tabs = document.getElementById('s-tabs');
  if(tabs) document.getElementById('scroll-area').scrollTo({top:tabs.offsetTop, behavior:'smooth'});
};

window.doLogout = async () => { await sb.auth.signOut(); window.location.replace('./login.html'); };
window.openYT   = url => window.open(url, '_blank');
window.playVid  = async (filePath, titleEnc) => {
  const title = decodeURIComponent(titleEnc);
  const { data } = await sb.storage.from('videos').createSignedUrl(filePath, 3600);
  if (!data?.signedUrl) { showToast('Could not load video'); return; }
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:16px';
  ov.innerHTML = `<video controls autoplay style="max-width:100%;max-height:78vh;border-radius:12px;outline:none"><source src="${data.signedUrl}"/></video>
    <button style="color:#fff;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);padding:10px 28px;border-radius:20px;font-size:14px;cursor:pointer;font-family:var(--font)" onclick="this.closest('div').remove()">Close</button>`;
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
};

init();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
