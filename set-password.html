<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="NatyaSpace"/>
<meta name="theme-color" content="#F5EDE0"/>
<title>NatyaSpace — Set Password</title>
<link rel="manifest" href="manifest.json"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="app">
  <div class="login-wrap">
    <div class="login-logo">Natya<span>Space</span></div>
    <p style="font-size:13px;color:var(--text3);margin-bottom:24px;text-align:center">Welcome! Set a password to access your account.</p>
    <div class="login-card">
      <div id="err" class="login-err" style="display:none"></div>
      <div id="success-msg" style="display:none;background:var(--green-lt);color:var(--green);border-radius:var(--r-sm);padding:10px 14px;font-size:13px;margin-bottom:14px"></div>
      <div class="form-field">
        <label>New Password</label>
        <input id="pass1" type="password" placeholder="Min. 8 characters" autocomplete="new-password"/>
      </div>
      <div class="form-field">
        <label>Confirm Password</label>
        <input id="pass2" type="password" placeholder="Repeat your password" autocomplete="new-password"/>
      </div>
      <button class="btn btn-primary btn-full" id="set-btn" style="margin-top:4px">Set Password</button>
    </div>
  </div>
</div>

<script type="module">
import { sb } from './supabase.js';

const errEl  = document.getElementById('err');
const succEl = document.getElementById('success-msg');
const btn    = document.getElementById('set-btn');

// Supabase magic-link/invite tokens land as hash params.
// The JS client picks them up automatically via onAuthStateChange.
const { data: { session } } = await sb.auth.getSession();

// If no session yet, wait for the token in the URL hash to be exchanged
if (!session) {
  const { data, error } = await sb.auth.getSessionFromUrl({ reauth: true });
  if (error || !data?.session) {
    errEl.style.display = '';
    errEl.textContent = 'Invalid or expired link. Please ask your teacher to resend the invite.';
    btn.disabled = true;
  }
}

async function doSetPassword() {
  const p1 = document.getElementById('pass1').value;
  const p2 = document.getElementById('pass2').value;

  errEl.style.display = 'none';
  succEl.style.display = 'none';

  if (p1.length < 8) {
    errEl.style.display = ''; errEl.textContent = 'Password must be at least 8 characters.'; return;
  }
  if (p1 !== p2) {
    errEl.style.display = ''; errEl.textContent = 'Passwords do not match.'; return;
  }

  btn.textContent = 'Saving…'; btn.disabled = true;

  const { error } = await sb.auth.updateUser({ password: p1 });

  if (error) {
    errEl.style.display = ''; errEl.textContent = error.message;
    btn.textContent = 'Set Password'; btn.disabled = false;
    return;
  }

  succEl.style.display = '';
  succEl.textContent = 'Password set! Redirecting you…';

  setTimeout(async () => {
    const { data: { session: sess } } = await sb.auth.getSession();
    const { data: prof } = await sb.from('profiles').select('role').eq('id', sess.user.id).single();
    window.location.replace(prof?.role === 'student' ? './student.html' : './app.html');
  }, 1200);
}

btn.addEventListener('click', doSetPassword);
document.getElementById('pass2').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSetPassword();
});
</script>
</body>
</html>
